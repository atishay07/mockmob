<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MockMob — Stop grinding alone.</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: { volt: '#d2f000', ink: '#0a0a0a' },
        fontFamily: {
          display: ['Space Grotesk', 'sans-serif'],
          body: ['Inter', 'sans-serif'],
          mono: ['Lexend', 'sans-serif'],
        },
        animation: {
          'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          'marquee': 'marquee 40s linear infinite',
        },
        keyframes: {
          marquee: {
            '0%': { transform: 'translateX(0)' },
            '100%': { transform: 'translateX(-50%)' },
          },
        },
      },
    },
  };
</script>
<style>
  /* ============== BASE LAYER ============== */
  :root {
    --volt: #d2f000;
    --volt-glow: rgba(210, 240, 0, 0.25);
    --volt-glow-strong: rgba(210, 240, 0, 0.5);
    --ink: #0a0a0a;
    --ink-2: #141414;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    background: var(--ink);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }
  body { min-height: 100vh; }
  ::selection { background: var(--volt); color: #000; }

  /* ============== TYPOGRAPHY SCALE (tight, responsive) ============== */
  .display-xl {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(40px, 7vw, 84px);
    line-height: 0.95;
    letter-spacing: -0.035em;
  }
  .display-lg {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(32px, 5vw, 52px);
    line-height: 1.02;
    letter-spacing: -0.025em;
  }
  .display-md {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(26px, 3.5vw, 40px);
    line-height: 1.05;
    letter-spacing: -0.02em;
  }
  .heading {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .eyebrow {
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--volt);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 999px;
    background: var(--volt);
    box-shadow: 0 0 8px var(--volt);
    display: inline-block;
  }
  .eyebrow.no-dot::before { display: none; }
  .mono-label {
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #71717a;
  }

  /* ============== BACKGROUNDS ============== */
  .grid-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .halo {
    position: fixed; z-index: 0; pointer-events: none;
    width: 900px; height: 900px;
    border-radius: 999px;
    background: var(--volt);
    opacity: 0.04;
    filter: blur(120px);
    top: -200px; left: 50%; transform: translateX(-50%);
  }

  /* ============== BUTTONS ============== */
  .btn-volt {
    background: var(--volt);
    color: #000;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    box-shadow: 0 0 24px var(--volt-glow);
    transition: all 0.15s ease;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-volt:hover { background: #e8ff4a; box-shadow: 0 0 32px var(--volt-glow-strong); }
  .btn-volt:active { transform: scale(0.97); }
  .btn-volt:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: none; }
  .btn-volt.sm { padding: 10px 18px; font-size: 12px; }
  .btn-volt.md { padding: 12px 22px; font-size: 13px; }
  .btn-volt.lg { padding: 16px 32px; font-size: 14px; }

  .btn-outline {
    background: rgba(255,255,255,0.02);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border-radius: 8px;
    transition: all 0.15s ease;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.05); }
  .btn-outline.sm { padding: 10px 18px; font-size: 12px; }
  .btn-outline.md { padding: 12px 22px; font-size: 13px; }
  .btn-outline.lg { padding: 16px 32px; font-size: 14px; }

  .btn-ghost {
    background: transparent;
    color: #a1a1aa;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 13px;
    transition: color 0.15s ease;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn-ghost:hover { color: #fff; }

  /* ============== GLASS CARD ============== */
  .glass {
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    backdrop-filter: blur(20px);
    transition: border-color 0.2s ease, background 0.2s ease;
  }
  .glass.hover:hover { border-color: rgba(255,255,255,0.2); cursor: pointer; }
  .glass.active { border-color: rgba(210, 240, 0, 0.5); background: rgba(210, 240, 0, 0.03); }
  .glass.volt-soft { border-color: rgba(210, 240, 0, 0.2); background: rgba(210, 240, 0, 0.02); }

  /* ============== FORM ============== */
  .input, .select, .textarea {
    width: 100%;
    padding: 11px 14px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .input::placeholder, .textarea::placeholder { color: #52525b; }
  .input:focus, .select:focus, .textarea:focus { border-color: rgba(210, 240, 0, 0.5); }
  .textarea { resize: none; font-family: inherit; }
  .select { appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23a1a1aa'%3E%3Cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; background-size: 16px; padding-right: 36px; }
  .select option { background: var(--ink-2); color: #fff; }

  /* ============== UTILITIES ============== */
  .text-volt { color: var(--volt); }
  .bg-volt { background: var(--volt); }
  .border-volt { border-color: var(--volt); }
  .volt-highlight {
    background: var(--volt);
    color: #000;
    padding: 0 10px;
    display: inline-block;
    transform: rotate(-1deg);
    box-shadow: 0 0 32px rgba(210, 240, 0, 0.3);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.15); }

  /* Page transitions */
  .view { animation: fadeIn 0.25s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  /* Nav active underline */
  .nav-link {
    padding: 14px 14px;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: #71717a;
    border-bottom: 2px solid transparent;
    transition: all 0.15s ease;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    background: transparent;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .nav-link:hover { color: #fff; }
  .nav-link.active { color: var(--volt); border-bottom-color: var(--volt); }

  /* Icon shims (svg inline) */
  .icon { width: 1em; height: 1em; display: inline-block; stroke: currentColor; stroke-width: 1.75; fill: none; stroke-linecap: round; stroke-linejoin: round; vertical-align: -0.125em; flex-shrink: 0; }

  /* Option hover feedback for test runner */
  .q-option {
    width: 100%;
    text-align: left;
    padding: 14px;
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.01);
    color: #fff;
    transition: all 0.15s ease;
    cursor: pointer;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .q-option:hover { border-color: rgba(255,255,255,0.2); }
  .q-option.selected { border-color: var(--volt); background: rgba(210, 240, 0, 0.05); }
  .q-option .letter {
    width: 30px; height: 30px;
    border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: 12px;
    background: rgba(255,255,255,0.05);
    color: #a1a1aa;
    flex-shrink: 0;
  }
  .q-option.selected .letter { background: var(--volt); color: #000; }

  /* Q palette chip */
  .q-chip {
    width: 34px; height: 34px;
    border-radius: 6px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 12px;
    background: rgba(255,255,255,0.03);
    color: #71717a;
    border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.1s ease;
    cursor: pointer;
  }
  .q-chip:hover { border-color: rgba(255,255,255,0.25); }
  .q-chip.done { background: rgba(210, 240, 0, 0.12); color: var(--volt); border-color: rgba(210, 240, 0, 0.35); }
  .q-chip.current { background: var(--volt); color: #000; border-color: var(--volt); }

  /* Badge pills */
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: 'Lexend', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .pill.subtle { background: rgba(255,255,255,0.05); color: #a1a1aa; }
  .pill.volt { background: rgba(210, 240, 0, 0.1); color: var(--volt); }
  .pill.red { background: rgba(248, 113, 113, 0.1); color: #f87171; }

  /* Progress bars */
  .bar {
    width: 100%; height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar > .fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
  }
  .fill-volt { background: var(--volt); box-shadow: 0 0 8px var(--volt); }
  .fill-amber { background: #fbbf24; }
  .fill-red { background: #f87171; }

  /* Marquee */
  .marquee-track {
    display: flex;
    gap: 48px;
    white-space: nowrap;
    width: max-content;
    animation: marquee 35s linear infinite;
    padding: 24px 0;
  }
  .marquee-track > span {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 3vw, 36px);
    color: #27272a;
    letter-spacing: -0.02em;
    display: inline-flex;
    align-items: center;
    gap: 48px;
  }
  .marquee-track > span:hover { color: var(--volt); }
  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Hide on mobile */
  .mobile-hide { display: none; }
  @media (min-width: 768px) { .mobile-hide { display: flex; } .md-show { display: block; } }

  /* Verdict styles */
  .verdict-good { color: var(--volt); }
  .verdict-mid { color: #fbbf24; }
  .verdict-bad { color: #f87171; }

  /* Podium bars */
  .podium {
    border-radius: 12px 12px 0 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.1);
    border-bottom: none;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding-top: 10px;
    flex: 1;
  }

  /* Chart canvas tight layout */
  canvas { max-width: 100%; }

  /* Stats card */
  .stat {
    padding: 18px;
    border-radius: 12px;
    background: rgba(255,255,255,0.015);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .stat.highlight { border-color: rgba(210, 240, 0, 0.3); background: rgba(210, 240, 0, 0.03); }
  .stat .value {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 900;
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #fff;
    margin: 14px 0 6px;
  }
  .stat.highlight .value { color: var(--volt); }

  /* Subject card */
  .subject-card {
    padding: 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.015);
    transition: all 0.15s ease;
    cursor: pointer;
    text-align: left;
  }
  .subject-card:hover { border-color: rgba(255,255,255,0.18); }
  .subject-card.selected { border-color: var(--volt); background: rgba(210, 240, 0, 0.04); }
  .subject-card .glyph {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px;
    color: var(--volt);
    line-height: 1;
    margin-bottom: 10px;
  }

  /* Count pill buttons */
  .count-btn {
    width: 48px; height: 40px;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 13px;
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.1);
    color: #a1a1aa;
    transition: all 0.12s ease;
    cursor: pointer;
  }
  .count-btn:hover { border-color: rgba(255,255,255,0.25); color: #fff; }
  .count-btn.active { background: var(--volt); color: #000; border-color: var(--volt); }

  /* Logo */
  .logo {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    font-style: italic;
    font-size: 20px;
    letter-spacing: -0.02em;
    color: #fff;
    text-decoration: none;
  }
  .logo .bolt {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: var(--volt);
    display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 0 18px var(--volt-glow);
  }
  .logo .dot { color: var(--volt); }

  /* Layout helpers */
  .container-narrow { max-width: 900px; margin: 0 auto; }
  .container-std { max-width: 1180px; margin: 0 auto; }
  .container-wide { max-width: 1280px; margin: 0 auto; }

  /* Hide scrollbar for horiz scroll regions */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }

  /* Avatar */
  .avatar {
    width: 32px; height: 32px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--volt), #8fa600);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 800;
    color: #000;
    font-size: 13px;
    flex-shrink: 0;
  }
  .avatar.lg { width: 44px; height: 44px; font-size: 16px; }
  .avatar.xl { width: 56px; height: 56px; font-size: 20px; }

  /* Smaller body on desktop */
  @media (min-width: 1024px) {
    html, body { font-size: 15px; }
  }
</style>
</head>

<div class="grid-bg"></div>
<div class="halo"></div>
<div id="app" style="position:relative; z-index: 1;"></div>

<!-- Chart.js for analytics -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
/* ================================================================================
   MOCKMOB — vanilla JS state machine. Pure HTML/CSS/JS. No React.
   ================================================================================ */

/* ============== SUBJECTS ============== */
const SUBJECTS = [
  { id: 'accountancy', name: 'Accountancy', short: 'ACC', glyph: '◈', chapters: ['Partnership', 'Company Accounts', 'Financial Statements', 'Cash Flow', 'Not-for-Profit'] },
  { id: 'economics', name: 'Economics', short: 'ECO', glyph: '◆', chapters: ['National Income', 'Money & Banking', 'Govt Budget', 'BoP', 'Indian Economy'] },
  { id: 'mathematics', name: 'Mathematics', short: 'MATH', glyph: '∑', chapters: ['Relations & Functions', 'Matrices', 'Calculus', 'Vectors', 'Probability'] },
  { id: 'business_studies', name: 'Business Studies', short: 'BST', glyph: '▲', chapters: ['Management', 'Planning', 'Marketing', 'Finance', 'Consumer Protection'] },
  { id: 'english', name: 'English', short: 'ENG', glyph: '✦', chapters: ['Reading Comprehension', 'Grammar', 'Vocabulary'] },
  { id: 'gat', name: 'General Test', short: 'GAT', glyph: '⬢', chapters: ['Current Affairs', 'Quantitative', 'Logical Reasoning', 'GK'] },
];

/* ============== COMPACT QUESTIONS (102) ============== */
const COMPACT_QS = [
  {id:'a1',s:'accountancy',c:'Partnership',q:'A and B share profits 3:2 with capitals ₹5L and ₹3L. Interest on capital @10% p.a. Profit before interest is ₹60,000 (insufficient). How much interest does B receive?',o:['₹30,000','₹22,500','₹20,000','₹15,000'],ci:1,ex:'When profits are insufficient, interest is distributed in ratio of interest amounts. Total would be ₹80,000, available ₹60,000. B gets 60,000 × (30,000/80,000) = ₹22,500.',d:'medium',src:'PYQ 2023'},
  {id:'a2',s:'accountancy',c:'Partnership',q:'Goodwill brought in cash by a new partner is credited to:',o:['Old partners\' capital a/c in sacrificing ratio','Old partners\' capital a/c in old ratio','Goodwill a/c','New partner\'s capital a/c'],ci:0,ex:'Goodwill compensates old partners for the share they sacrifice; distributed in sacrificing ratio.',d:'easy',src:'PYQ 2022'},
  {id:'a3',s:'accountancy',c:'Partnership',q:'On dissolution, which account is prepared to close the books?',o:['Profit & Loss','Realisation','Revaluation','Trading'],ci:1,ex:'Realisation Account records sale of assets and payment of liabilities to determine profit/loss on dissolution.',d:'easy',src:'PYQ 2023'},
  {id:'a4',s:'accountancy',c:'Partnership',q:'X, Y, Z share 5:3:2. Z retires. New X:Y is 3:2. Gaining ratio is:',o:['3:2','5:3','1:1','2:1'],ci:2,ex:'Gain = New − Old. X: 3/5 − 5/10 = 1/10; Y: 2/5 − 3/10 = 1/10. Ratio 1:1.',d:'hard',src:'PYQ Style'},
  {id:'a5',s:'accountancy',c:'Company Accounts',q:'Company issued 10,000 shares of ₹10 at 20% premium. Application ₹3, allotment ₹5 (incl. premium), balance on call. Amount on application:',o:['₹30,000','₹50,000','₹20,000','₹1,00,000'],ci:0,ex:'Application = 10,000 × ₹3 = ₹30,000. Premium comes at allotment.',d:'medium',src:'PYQ 2024'},
  {id:'a6',s:'accountancy',c:'Company Accounts',q:'Forfeited shares account is shown in balance sheet under:',o:['Reserves & Surplus','Share Capital (added to called-up)','Current Liabilities','Long-term Borrowings'],ci:1,ex:'Per Schedule III, forfeited shares amount is added to Subscribed Capital in Notes to Share Capital.',d:'medium',src:'PYQ 2022'},
  {id:'a7',s:'accountancy',c:'Company Accounts',q:'Debentures issued as collateral security are:',o:['Recorded with journal entry','Shown as contingent liability only','Shown under borrowings with disclosure','Not shown anywhere'],ci:2,ex:'May be recorded by entry or disclosed in notes; appear under Long-term Borrowings.',d:'hard',src:'PYQ Style'},
  {id:'a8',s:'accountancy',c:'Financial Statements',q:'Current Ratio of 2:1 means:',o:['Current liabilities twice assets','Current assets twice liabilities','Equal CA and CL','Quick assets twice liabilities'],ci:1,ex:'CR = CA/CL. 2:1 means CA is twice CL — good short-term liquidity.',d:'easy',src:'PYQ 2023'},
  {id:'a9',s:'accountancy',c:'Financial Statements',q:'Debt-Equity Ratio 0.5:1 indicates:',o:['High leverage','Low leverage','Equal debt and equity','Negative equity'],ci:1,ex:'Debt is half of equity — conservative financing with lower risk.',d:'easy',src:'PYQ Style'},
  {id:'a10',s:'accountancy',c:'Financial Statements',q:'Which is NOT a profitability ratio?',o:['Gross Profit Ratio','Operating Ratio','Current Ratio','Return on Investment'],ci:2,ex:'Current Ratio is a liquidity ratio, not profitability.',d:'easy',src:'PYQ 2022'},

const LS = {
  get(k) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch (e) { console.error(e); } },
  remove(k) { try { localStorage.removeItem(k); } catch {} },
};

  state.attempts = LS.get('mm_attempts') || [];
  if (profile) {
    state.user = profile;
    state.view = profile.subjects && profile.subjects.length ? 'dashboard' : 'onboarding';
  } else {
    state.view = 'landing';
  }
  render();
}

/* ============== HELPERS ============== */
const $ = (sel, root = document) => root.querySelector(sel);
const esc = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const shuffle = a => { a = [...a]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; };
const subjBy = id => SUBJECTS.find(s => s.id === id);

function setView(v) { state.view = v; render(); }

function saveUser(u) {
  state.user = u;
  LS.set('mm_user', u);
}

function saveAttempt(a) {
  state.attempts.push(a);
  LS.set('mm_attempts', state.attempts);
  const existing = state.leaderboard.find(x => x.name === state.user.name);
  if (existing) {
    existing.totalScore += a.score;
    existing.tests += 1;
    existing.avgScore = existing.totalScore / existing.tests;
    existing.lastPlayed = Date.now();
  } else {
    state.leaderboard.push({ name: state.user.name, totalScore: a.score, tests: 1, avgScore: a.score, lastPlayed: Date.now() });
  }
  state.leaderboard.sort((x, y) => y.totalScore - x.totalScore);
  LS.set('mm_leaderboard', state.leaderboard);
}

function submitQuestion(q) {
  state.pending.push({ ...q, id: 'u' + Date.now(), status: 'pending', uploadedBy: state.user.name, submittedAt: Date.now() });
  LS.set('mm_pending', state.pending);
}

function moderate(id, approve) {
  const item = state.pending.find(p => p.id === id);
  if (!item) return;
  state.pending = state.pending.filter(p => p.id !== id);
  LS.set('mm_pending', state.pending);
  if (approve) {
    state.questions.push({ ...item, status: 'live' });
    LS.set('mm_questions', state.questions);
  }
}

/* ============== TEST RUNNER ============== */
let timerInterval = null;
function startTimer() {
  clearInterval(timerInterval);
  if (!state.currentTest) return;
  timerInterval = setInterval(() => {
    state.currentTest.timeLeft -= 1;
    if (state.currentTest.timeLeft <= 0) {
      clearInterval(timerInterval);
      submitTest();
      return;
    }
    const el = $('#timer');
    if (el) {
      const mm = Math.floor(state.currentTest.timeLeft/60).toString().padStart(2,'0');
      const ss = (state.currentTest.timeLeft%60).toString().padStart(2,'0');
      el.textContent = mm + ':' + ss;
      el.classList.toggle('verdict-bad', state.currentTest.timeLeft < 60);
      el.classList.toggle('text-volt', state.currentTest.timeLeft >= 60);
      if (state.currentTest.timeLeft < 60) el.classList.add('animate-pulse-slow');
    }
  }, 1000);
}

function submitTest() {
  clearInterval(timerInterval);
  const t = state.currentTest;
  if (!t) return;
  let correct = 0, wrong = 0, unattempted = 0;
  const details = t.questions.map(qu => {
    const given = t.answers[qu.id];
    if (given === undefined) { unattempted++; return { qid: qu.id, given: null, correct: qu.correctIndex, isCorrect: null }; }
    const isC = given === qu.correctIndex;
    if (isC) correct++; else wrong++;
    return { qid: qu.id, given, correct: qu.correctIndex, isCorrect: isC };
  });
  const raw = correct * 5 - wrong;
  const max = t.questions.length * 5;
  const score = Math.max(0, Math.round((raw/max)*100));
  const attempt = { subject: t.subject, score, correct, wrong, unattempted, total: t.questions.length, details, completedAt: Date.now(), questionsSnapshot: t.questions };
  saveAttempt(attempt);
  state.result = attempt;
  setView('result');
}

function AnalyticsView() {
  if (state.attempts.length === 0) {
    return `
      <div class="container-narrow">
        <div class="eyebrow mb-2">// Weakness radar</div>
        <h1 class="display-md mb-5">No signal <span class="text-volt" style="font-style:italic">yet.</span></h1>
        <div class="glass" style="padding:50px; text-align:center">
          ${ICON.radar.replace('class="icon"','class="icon" style="color:#3f3f46; width:36px; height:36px; margin-bottom:10px"')}
          <p style="font-family:'Space Grotesk',sans-serif; font-weight:700; color:#a1a1aa">Drop a test to boot up the radar.</p>
        </div>
      </div>
    `;
  }

  // Aggregate weakest chapters
  const byChapter = {};
  state.attempts.forEach(a => {
    (a.questionsSnapshot || []).forEach(q => {
      const d = a.details.find(x => x.qid === q.id); if (!d) return;
      if (!byChapter[q.chapter]) byChapter[q.chapter] = { chapter: q.chapter, correct: 0, total: 0 };
      byChapter[q.chapter].total++;
      if (d.isCorrect === true) byChapter[q.chapter].correct++;
    });
  });
  const chapterArr = Object.values(byChapter).map(x => ({ ...x, acc: Math.round((x.correct/x.total)*100) })).sort((a,b) => a.acc - b.acc).slice(0,6);

  // Attempt totals
  const totCorrect = state.attempts.reduce((a,b)=>a+b.correct,0);
  const totWrong = state.attempts.reduce((a,b)=>a+b.wrong,0);
  const totSkip = state.attempts.reduce((a,b)=>a+b.unattempted,0);

  return `
    <div style="display:flex; flex-direction:column; gap:18px">
      <div>
        <div class="eyebrow mb-2">// Weakness radar</div>
        <h1 class="display-md">Where you <span class="text-volt" style="font-style:italic">leak marks.</span></h1>
        <p class="text-sm text-zinc-500 mt-2">Your last ${state.attempts.length} test${state.attempts.length>1?'s':''}, autopsied.</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div class="glass" style="padding:22px">
          <div class="eyebrow mb-3">// Score trajectory</div>
          <div style="height: 200px"><canvas id="chart-timeline"></canvas></div>
        </div>
        <div class="glass" style="padding:22px">
          <div class="eyebrow mb-3">// Subject average</div>
          <div style="height: 200px"><canvas id="chart-subjects"></canvas></div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-3">
        <div class="glass lg:col-span-2" style="padding:22px">
          <div class="eyebrow mb-3">// Capability radar</div>
          <div style="height: 280px"><canvas id="chart-radar"></canvas></div>
        </div>
        <div class="glass" style="padding:22px">
          <div class="eyebrow mb-3">// Attempt split</div>
          <div style="height: 180px; position: relative"><canvas id="chart-pie"></canvas></div>
          <div style="display:flex; flex-direction:column; gap:6px; margin-top:10px">
            <div style="display:flex; justify-content:space-between; font-size:12px"><span style="display:flex; align-items:center; gap:6px; color:#a1a1aa"><span style="width:8px; height:8px; border-radius:2px; background:var(--volt)"></span> Correct</span><span style="font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--volt)">${totCorrect}</span></div>
            <div style="display:flex; justify-content:space-between; font-size:12px"><span style="display:flex; align-items:center; gap:6px; color:#a1a1aa"><span style="width:8px; height:8px; border-radius:2px; background:#f87171"></span> Wrong</span><span style="font-family:'Space Grotesk',sans-serif; font-weight:700; color:#f87171">${totWrong}</span></div>
            <div style="display:flex; justify-content:space-between; font-size:12px"><span style="display:flex; align-items:center; gap:6px; color:#a1a1aa"><span style="width:8px; height:8px; border-radius:2px; background:#52525b"></span> Skipped</span><span style="font-family:'Space Grotesk',sans-serif; font-weight:700; color:#a1a1aa">${totSkip}</span></div>
          </div>
        </div>
      </div>

      <div class="glass" style="padding:22px">
        <div class="eyebrow mb-4">// Weakest chapters · work on these</div>
        ${chapterArr.length === 0 ? `<p class="text-sm text-zinc-500">Take more tests to see chapter-level insights.</p>` : `
          <div style="display:flex; flex-direction:column; gap:12px">
            ${chapterArr.map(c => {
              const cls = c.acc < 50 ? 'fill-red' : c.acc < 75 ? 'fill-amber' : 'fill-volt';
              const tcls = c.acc < 50 ? 'verdict-bad' : c.acc < 75 ? 'verdict-mid' : 'text-volt';
              return `
                <div>
                  <div class="flex justify-between mb-1.5 text-sm">
                    <span style="color:#fff; font-family:'Space Grotesk',sans-serif; font-weight:500">${esc(c.chapter)}</span>
                    <span class="${tcls}" style="font-family:'Space Grotesk',sans-serif; font-weight:700">${c.acc}%</span>
                  </div>
                  <div class="bar"><div class="fill ${cls}" style="width:${c.acc}%"></div></div>
                </div>
              `;
            }).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

function renderCharts() {
  if (state.attempts.length === 0) return;
  const defaults = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { backgroundColor: '#141414', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, titleFont: { family: 'Space Grotesk' }, bodyFont: { family: 'Space Grotesk' } } },
  };
  const gridCol = 'rgba(255,255,255,0.05)';
  const tickCol = '#52525b';
  const tickFont = { family: 'Space Grotesk', size: 10 };

  // Timeline
  const tEl = $('#chart-timeline');
  if (tEl) new Chart(tEl, {
    type: 'line',
    data: {
      labels: state.attempts.map((_,i) => 'T'+(i+1)),
      datasets: [{
        data: state.attempts.map(a => a.score),
        borderColor: '#d2f000',
        backgroundColor: 'rgba(210,240,0,0.1)',
        borderWidth: 2.5,
        pointRadius: 4,
        pointBackgroundColor: '#d2f000',
        tension: 0.25,
        fill: true,
      }],
    },
    options: { ...defaults,
      scales: {
        y: { min: 0, max: 100, grid: { color: gridCol }, ticks: { color: tickCol, font: tickFont } },
        x: { grid: { color: gridCol }, ticks: { color: tickCol, font: tickFont } },
      },
    },
  });

  // Subjects bar
  const bySubj = {};
  state.attempts.forEach(a => {
    if (!bySubj[a.subject]) bySubj[a.subject] = { total: 0, count: 0 };
    bySubj[a.subject].total += a.score; bySubj[a.subject].count += 1;
  });
  const subjData = Object.entries(bySubj).map(([k,v]) => ({ name: subjBy(k).short, avg: Math.round(v.total/v.count) }));
  const sEl = $('#chart-subjects');
  if (sEl) new Chart(sEl, {
    type: 'bar',
    data: {
      labels: subjData.map(s => s.name),
      datasets: [{ data: subjData.map(s => s.avg), backgroundColor: '#d2f000', borderRadius: 6 }],
    },
    options: { ...defaults,
      scales: {
        y: { min: 0, max: 100, grid: { color: gridCol }, ticks: { color: tickCol, font: tickFont } },
        x: { grid: { display: false }, ticks: { color: tickCol, font: tickFont } },
      },
    },
  });

  // Radar
  const rEl = $('#chart-radar');
  if (rEl && subjData.length >= 3) {
    new Chart(rEl, {
      type: 'radar',
      data: {
        labels: subjData.map(s => s.name),
        datasets: [{
          data: subjData.map(s => s.avg),
          borderColor: '#d2f000',
          backgroundColor: 'rgba(210,240,0,0.2)',
          borderWidth: 2,
          pointBackgroundColor: '#d2f000',
        }],
      },
      options: { ...defaults,
        scales: {
          r: {
            min: 0, max: 100,
            grid: { color: gridCol },
            angleLines: { color: gridCol },
            pointLabels: { color: '#a1a1aa', font: { family: 'Space Grotesk', size: 11, weight: '600' } },
            ticks: { color: '#52525b', backdropColor: 'transparent', font: tickFont },
          },
        },
      },
    });
  } else if (rEl) {
    const ctx = rEl.getContext('2d');
    ctx.fillStyle = '#71717a';
    ctx.font = '13px Inter';
    ctx.textAlign = 'center';
    ctx.fillText('Take mocks in 3+ subjects to activate the radar.', rEl.width/2, rEl.height/2);
  }

  // Pie
  const totCorrect = state.attempts.reduce((a,b)=>a+b.correct,0);
  const totWrong = state.attempts.reduce((a,b)=>a+b.wrong,0);
  const totSkip = state.attempts.reduce((a,b)=>a+b.unattempted,0);
  const pEl = $('#chart-pie');
  if (pEl) new Chart(pEl, {
    type: 'doughnut',
    data: {
      labels: ['Correct','Wrong','Skipped'],
      datasets: [{
        data: [totCorrect, totWrong, totSkip],
        backgroundColor: ['#d2f000','#f87171','#52525b'],
        borderColor: '#0a0a0a',
        borderWidth: 2,
      }],
    },
    options: { ...defaults, cutout: '55%' },
  });
}

/* ============== EVENT BINDING ============== */
function bindEvents() {
  // Generic nav
  document.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', e => {
    e.preventDefault();
    setView(el.dataset.go);
  }));
  document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => setView(el.dataset.nav)));

  // Login
  const loginBtn = $('#login-submit');
  const loginInp = $('#login-name');
  if (loginBtn) {
    const doLogin = () => {
      const name = loginInp.value.trim();
      if (!name) return;
      saveUser({ name, subjects: [], joinedAt: Date.now() });
      setView('onboarding');
    };
    loginBtn.addEventListener('click', doLogin);
    loginInp.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  }

  // Onboarding
  document.querySelectorAll('[data-subject]').forEach(el => el.addEventListener('click', () => {
    state.tempSelected = state.tempSelected || [];
    const id = el.dataset.subject;
    if (state.tempSelected.includes(id)) state.tempSelected = state.tempSelected.filter(x => x !== id);
    else if (state.tempSelected.length < 5) state.tempSelected.push(id);
    render();
  }));
  const contBtn = $('#onboard-continue');
  if (contBtn) contBtn.addEventListener('click', () => {
    const subs = state.tempSelected || [];
    if (subs.length === 0) return;
    state.user.subjects = subs;
    saveUser(state.user);
    state.tempSelected = null;
    setView('dashboard');
  });

  // Logout
  const logout = $('#nav-logout');
  if (logout) logout.addEventListener('click', () => {
    LS.remove('mm_user');
    state.user = null;
    setView('landing');
  });

  // Dashboard
  document.querySelectorAll('[data-dash-subject]').forEach(el => el.addEventListener('click', () => {
    state.dashSubject = el.dataset.dashSubject;
    render();
  }));
  document.querySelectorAll('[data-count]').forEach(el => el.addEventListener('click', () => {
    state.dashCount = parseInt(el.dataset.count);
    render();
  }));
  const startBtn = $('#start-test');
  if (startBtn) startBtn.addEventListener('click', () => {
    const sid = startBtn.dataset.sid;
    const ct = parseInt(startBtn.dataset.ct);
    const pool = state.questions.filter(q => q.subject === sid);
    const picked = shuffle(pool).slice(0, Math.min(ct, pool.length));
    state.currentTest = { subject: sid, questions: picked, idx: 0, answers: {}, timeLeft: picked.length * 60, startedAt: Date.now() };
    setView('test');
  });

  // Test runner
  document.querySelectorAll('[data-pick]').forEach(el => el.addEventListener('click', () => {
    const t = state.currentTest;
    const q = t.questions[t.idx];
    t.answers[q.id] = parseInt(el.dataset.pick);
    // Re-render just the options/palette efficiently via full render
    render();
  }));
  const prevBtn = $('#prev-q');
  if (prevBtn) prevBtn.addEventListener('click', () => { if (state.currentTest.idx > 0) { state.currentTest.idx -= 1; render(); } });
  const nextBtn = $('#next-q');
  if (nextBtn) nextBtn.addEventListener('click', () => { if (state.currentTest.idx < state.currentTest.questions.length-1) { state.currentTest.idx += 1; render(); } });
  document.querySelectorAll('[data-jump]').forEach(el => el.addEventListener('click', () => {
    state.currentTest.idx = parseInt(el.dataset.jump);
    render();
  }));
  const submitBtn = $('#submit-test');
  if (submitBtn) submitBtn.addEventListener('click', submitTest);
  const exitBtn = $('#test-exit');
  if (exitBtn) exitBtn.addEventListener('click', () => {
    if (confirm('Exit this test? Progress will be lost.')) {
      clearInterval(timerInterval);
      state.currentTest = null;
      setView('dashboard');
    }
  });

  // Result
  const rExit = $('#result-exit');
  if (rExit) rExit.addEventListener('click', () => { state.result = null; state.currentTest = null; setView('dashboard'); });

  // Upload
  const upSubj = $('#up-subject');
  if (upSubj) upSubj.addEventListener('change', () => { state.uploadForm.subject = upSubj.value; state.uploadForm.chapter = ''; render(); });
  const upCh = $('#up-chapter');
  if (upCh) upCh.addEventListener('change', () => { state.uploadForm.chapter = upCh.value; });
  const upQ = $('#up-question');
  if (upQ) upQ.addEventListener('input', () => { state.uploadForm.question = upQ.value; });
  const upEx = $('#up-explain');
  if (upEx) upEx.addEventListener('input', () => { state.uploadForm.explanation = upEx.value; });
  const upDiff = $('#up-diff');
  if (upDiff) upDiff.addEventListener('change', () => { state.uploadForm.difficulty = upDiff.value; });
  const upSrc = $('#up-src');
  if (upSrc) upSrc.addEventListener('input', () => { state.uploadForm.source = upSrc.value; });
  document.querySelectorAll('[data-opt]').forEach(el => el.addEventListener('input', () => {
    state.uploadForm.options[parseInt(el.dataset.opt)] = el.value;
  }));
  document.querySelectorAll('[data-correct]').forEach(el => el.addEventListener('click', () => {
    state.uploadForm.correctIndex = parseInt(el.dataset.correct);
    render();
  }));
  const sub = $('#submit-upload');
  if (sub) sub.addEventListener('click', () => {
    const f = state.uploadForm;
    const valid = f.subject && f.chapter && f.question.trim().length>10 && f.options.every(o=>o.trim()) && f.explanation.trim();
    if (!valid) { state.uploadMsg = 'Fill every field. Question needs 10+ chars.'; render(); return; }
    submitQuestion({ ...f });
    state.uploadForm = { subject:'', chapter:'', question:'', options:['','','',''], correctIndex:0, explanation:'', difficulty:'medium', source:'Community' };
    state.uploadMsg = '✓ Submitted. Off to the moderation queue.';
    render();
    setTimeout(() => { if (state.view === 'upload') { state.uploadMsg = null; render(); } }, 3500);
  });

  // Moderation
  document.querySelectorAll('[data-mod-id]').forEach(el => el.addEventListener('click', () => {
    moderate(el.dataset.modId, el.dataset.modOk === '1');
    render();
  }));
}

/* ============== INIT ============== */
document.addEventListener('DOMContentLoaded', boot);
if (document.readyState !== 'loading') boot();
</script>
</body>
</html>
